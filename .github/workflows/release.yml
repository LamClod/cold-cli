name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone dependencies
        shell: bash
        run: |
          git clone --depth 1 https://github.com/LamClod/cold-sdk.git ../cold-sdk
          git clone --depth 1 https://github.com/LamClod/cold-context.git ../cold-context
          git clone --depth 1 https://github.com/LamClod/cold-tools.git ../cold-tools
          git clone --depth 1 https://github.com/LamClod/cold-agent-sdk.git ../cold-agent-sdk
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/cold.exe dist/cold-${{ matrix.target }}.exe
          else
            cp target/${{ matrix.target }}/release/cold dist/cold-${{ matrix.target }}
            chmod +x dist/cold-${{ matrix.target }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cold-${{ matrix.target }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
