name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone dependencies
        run: |
          git clone --depth 1 https://github.com/LamClod/cold-sdk.git ../cold-sdk
          git clone --depth 1 https://github.com/LamClod/cold-context.git ../cold-context
          git clone --depth 1 https://github.com/LamClod/cold-tools.git ../cold-tools
          git clone --depth 1 https://github.com/LamClod/cold-agent-sdk.git ../cold-agent-sdk
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone dependencies
        run: |
          git clone --depth 1 https://github.com/LamClod/cold-sdk.git ../cold-sdk
          git clone --depth 1 https://github.com/LamClod/cold-context.git ../cold-context
          git clone --depth 1 https://github.com/LamClod/cold-tools.git ../cold-tools
          git clone --depth 1 https://github.com/LamClod/cold-agent-sdk.git ../cold-agent-sdk
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features -- -D warnings
